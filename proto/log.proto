syntax = "proto3";
package log;

import "google/protobuf/wrappers.proto";
import "google/protobuf/timestamp.proto";

service LogService {
  rpc RegistrarLog (LogRequest) returns (LogResponse);
  rpc BuscarLog (LogIdRequest) returns (LogResponse);
}

message LogRequest {
  string tipo = 1;
  string descricao = 2;
  google.protobuf.Int32Value id_verificacao = 3;
  google.protobuf.BoolValue voto_valido = 4;
  google.protobuf.Int32Value id_relatorio = 5;
}

message LogIdRequest {
  int32 id_log = 1;
}

message LogResponse {
  string status = 1;
  string mensagem = 2;
  int32 id_log = 3;
  string tipo = 4;
  string descricao = 5;
  google.protobuf.Timestamp data_hora = 6;
  google.protobuf.Int32Value id_verificacao = 7;
  google.protobuf.BoolValue voto_valido = 8;
  google.protobuf.Int32Value id_relatorio = 9;
  string assinatura = 10;
  bool valido = 11;
}
