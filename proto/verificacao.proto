syntax = "proto3";
package verificacao;

import "google/protobuf/timestamp.proto";

service VerificacaoService {
  rpc ExecutarVerificacao(VerificacaoRequest) returns (VerificacaoResponse);
  rpc BuscarVerificacao(VerificacaoIdRequest) returns (VerificacaoResponse);
  rpc StreamVerificacoes(VerificacaoIdRequest) returns (stream VerificacaoResponse);
}

message VerificacaoRequest {
  int32 votos = 1;
  int32 recibos = 2;
  string criado_por = 3;
}

message VerificacaoIdRequest {
  int32 id_verificacao = 1;
}

message VerificacaoResponse {
  int32 id_verificacao = 1;
  bool resultado = 2;
  string mensagem = 3;
  google.protobuf.Timestamp data_hora = 4;
}
